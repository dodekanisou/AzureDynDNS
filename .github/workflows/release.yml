name: Release AzureDynDNS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/dotnetcore.yml
    with:
      publish-artifacts: true

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "dockerhub_url=https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/azuredyndns" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Source
            See the source for this release at https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}.

            ${{ steps.release_body.outputs.dockerhub_url != '' && format('## Docker Hub\nDocker Hub repository: {0}', steps.release_body.outputs.dockerhub_url) || '' }}

            ## Assets
            The release assets below contain the published binaries for this tag.
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
